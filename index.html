<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header with Theme Toggle -->
        <header>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </header>

        <!-- Greeting Section -->
        <section class="greeting-section">
            <div class="time-display" id="timeDisplay"></div>
            <div class="date-display" id="dateDisplay"></div>
            <div class="greeting" id="greeting"></div>
        </section>

        <!-- Focus Timer Section -->
        <section class="timer-section">
            <h2>Focus Timer</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button id="startBtn" class="btn btn-primary">Start</button>
                <button id="stopBtn" class="btn btn-secondary">Stop</button>
                <button id="resetBtn" class="btn btn-secondary">Reset</button>
            </div>
        </section>

        <!-- To-Do List Section -->
        <section class="todo-section">
            <h2>To-Do List</h2>
            <div class="todo-input-container">
                <input type="text" id="todoInput" placeholder="Add a new task..." />
                <button id="addTodoBtn" class="btn btn-primary">Add</button>
            </div>
            <ul id="todoList" class="todo-list"></ul>
        </section>

        <!-- Quick Links Section -->
        <section class="links-section">
            <h2>Quick Links</h2>
            <div class="links-input-container">
                <input type="text" id="linkName" placeholder="Link name" />
                <input type="url" id="linkUrl" placeholder="URL" />
                <button id="addLinkBtn" class="btn btn-primary">Add Link</button>
            </div>
            <div id="linksList" class="links-list"></div>
        </section>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
